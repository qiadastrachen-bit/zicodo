<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#87C8B4" />
    <meta name="apple-mobile-web-app-title" content="zicodo" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>zicodo</title>
    <!-- 预加载阿里巴巴普惠体，加速字体显示 -->
    <link rel="preload" href="/fonts/AlibabaPuHuiTi-3-55-Regular.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/AlibabaPuHuiTi-3-65-Medium.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/AlibabaPuHuiTi-3-85-Bold.woff2" as="font" type="font/woff2" crossorigin>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    <script>
      // 注册 Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then((reg) => console.log('[SW] 注册成功:', reg.scope))
            .catch((err) => console.error('[SW] 注册失败:', err));
        });
      }
    </script>
  </body>
</html>
