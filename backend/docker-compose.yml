version: '3.8'

services:
  # 字灵后端 API 服务
  ziling-backend:
    build: .
    container_name: ziling-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - AI_PROVIDER=deepseek
      - AI_MODEL=deepseek-chat
    volumes:
      - ./data:/app/data  # SQLite 数据持久化（重启不丢数据）
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx 反向代理（前端 + API 统一入口）
  ziling-nginx:
    image: nginx:alpine
    container_name: ziling-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro  # 前端构建产物
    depends_on:
      - ziling-backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
