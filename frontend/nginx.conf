# ============================================
# zicodo 前端 Nginx 配置
# 功能：
#   1. 提供 Vue 3 SPA 静态资源
#   2. 将 /api 和 /ziling 请求反向代理到后端
#   3. 启用 gzip 压缩
#   4. 支持 Vue Router history 模式（404 回退到 index.html）
# ============================================

server {
    listen 80;
    server_name zicodo.hello.com _;

    # 根路径和字符编码
    root /usr/share/nginx/html;
    charset utf-8;

    # 访问日志和错误日志
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # ─── gzip 压缩 ──────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff2;

    # ─── API 反向代理到后端服务 ──────────────────
    # 规则：
    #   - /api/*    → backend:3000/api/*
    #   - /ziling/* → backend:3000/ziling/*
    # 说明：proxy_pass 末尾不带 /，所以请求路径会原样转发

    location /api/ {
        proxy_pass http://backend:3000;

        # 保留客户端真实 IP 信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE（Server-Sent Events）流式响应配置
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;

        # 超时设置（AI 对话可能需要较长响应时间）
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location /ziling/ {
        proxy_pass http://backend:3000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 支持
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;

        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # ─── Vue Router history 模式 ───────────────
    # 规则：任何未匹配的非文件请求都回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── 静态资源缓存 ───────────────────────────
    # JS/CSS/图片/字体 等资源设置 30 天缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf|mp3|mp4)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ─── 禁止访问隐藏文件 ─────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
