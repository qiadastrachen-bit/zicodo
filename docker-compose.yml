# ============================================
# zicodo 项目 Docker Compose 配置
# 部署到腾讯云服务器：120.53.11.84
#
# ⚠️ 重要：路径说明（严格对应实际目录结构）
#   - 后端源码位置：  ./backend/     （根目录下的 backend/ 目录，独立目录）
#   - 前端源码位置：  ./frontend/    （根目录下的 frontend/ 目录，独立目录，不在 backend/ 下！）
#   - 环境变量文件：  ./backend/.env  （需从 backend/.env.example 复制后修改）
#   - 后端 Dockerfile: ./backend/Dockerfile
#   - 前端 Dockerfile: ./frontend/Dockerfile
#
# 使用方法：
#   0. 首次部署：cp backend/.env.example backend/.env  # 并编辑填入实际密钥
#   1. 在项目根目录执行：docker compose up -d --build
#   2. 查看状态：docker compose ps
#   3. 查看日志：docker compose logs -f
#   4. 停止服务：docker compose down
# ============================================

services:

  # ============================================
  # 服务 1：前端 (Vue 3 + Nginx)
  # - 监听主机 80 端口
  # - 将 /api 和 /ziling 请求反向代理到 backend:3000
  # ============================================
  frontend:
    build:
      # 前端源码在：frontend/  （根目录下，不在 backend/frontend/ 下！）
      context: ./frontend
      dockerfile: Dockerfile
    container_name: zicodo-frontend
    restart: unless-stopped

    # 端口映射：主机 80 → 容器 80
    ports:
      - "80:80"
      # 如需 HTTPS，取消下行注释并配置 SSL 证书
      # - "443:443"

    # 依赖：后端服务先启动
    depends_on:
      - backend

    # 使用自建网络，实现服务间的 DNS 解析
    networks:
      - zicodo-net

    # 资源限制（可选，根据服务器配置调整）
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

    # 健康检查：验证 Nginx 和静态页面是否可访问
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # ============================================
  # 服务 2：后端 API (Express + SQLite + Sequelize)
  # - 只在内部网络暴露 3000 端口，不直接映射到主机
  # - 通过 frontend 的 Nginx 反向代理访问
  # ============================================
  backend:
    build:
      # 后端源码在：backend/  （注意：不是 backend/ziling-backend/！）
      # backend/ 目录本身就是后端根目录，内含 src/, package.json, Dockerfile 等
      context: ./backend
      dockerfile: Dockerfile
    container_name: zicodo-backend
    restart: unless-stopped

    # 仅在内部网络暴露端口，不映射到主机（通过 Nginx 代理访问）
    expose:
      - "3000"

    # 数据持久化：
    #   1. 挂载 .env 配置文件（只读）
    #      ⚠️ 部署前必须执行：cp backend/.env.example backend/.env
    #      然后编辑 backend/.env，填入实际的 JWT_SECRET 和 DEEPSEEK_API_KEY
    #   2. 挂载 SQLite 数据目录（持久化数据库文件）
    volumes:
      - ./backend/.env:/app/.env:ro
      - zicodo-data:/app/data

    # 环境变量（也会被 .env 中的值覆盖）
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - DB_PATH=/app/data/zicodo.db

    # 使用自建网络
    networks:
      - zicodo-net

    # 资源限制（后端需要更多资源，特别是 AI 对话时）
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1024M
        reservations:
          cpus: "0.5"
          memory: 256M

    # 健康检查：验证 /api/health 端点
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

# ============================================
# 网络配置：自建桥接网络
# ============================================
networks:
  zicodo-net:
    driver: bridge
    # 启用容器间的 DNS 解析（服务名即域名）
    name: zicodo-network

# ============================================
# 数据卷配置：持久化 SQLite 数据库
# ============================================
volumes:
  zicodo-data:
    # 使用本地 driver，数据保存在 Docker 管理的目录
    driver: local
    name: zicodo-sqlite-data
